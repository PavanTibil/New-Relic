name: Terraform Runner

on:
  workflow_dispatch:
    inputs:
      action:
        required: true
      project:
        required: true

# ✅ IMPORTANT FIX
permissions:
  actions: read
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Input
        run: |
          if [[ "${{ github.event.inputs.action }}" != "apply" && "${{ github.event.inputs.action }}" != "destroy" ]]; then
            echo "❌ Invalid action. Use apply or destroy only."
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug - List files
        run: ls -R

      - name: Validate Project Path
        run: |
          if [ ! -d "${{ github.event.inputs.project }}" ]; then
            echo "❌ Directory not found: ${{ github.event.inputs.project }}"
            exit 1
          fi

      # ✅ FIXED: now has permission to read artifacts
      - name: Download Terraform State from Previous Runs
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner,
              repo,
            });

            const project = process.env.PROJECT;

            const filtered = artifacts.data.artifacts
              .filter(a => a.name === `tfstate-${project}`);

            if (filtered.length === 0) {
              console.log("No previous state found.");
              return;
            }

            const latest = filtered.sort((a, b) =>
              new Date(b.created_at) - new Date(a.created_at)
            )[0];

            console.log(`Downloading artifact: ${latest.name}`);

            const download = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: latest.id,
              archive_format: 'zip',
            });

            const fs = require('fs');
            fs.writeFileSync('artifact.zip', Buffer.from(download.data));

        env:
          PROJECT: ${{ github.event.inputs.project }}

      - name: Extract Terraform State
        run: |
          if [ -f artifact.zip ]; then
            unzip artifact.zip -d ${{ github.event.inputs.project }}
          else
            echo "No artifact to extract"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Init
        working-directory: ${{ github.event.inputs.project }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: ${{ github.event.inputs.project }}
        run: terraform plan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: ${{ github.event.inputs.project }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: ${{ github.event.inputs.project }}
        run: terraform destroy -auto-approve

      - name: Upload Terraform State
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfstate-${{ github.event.inputs.project }}
          path: |
            ${{ github.event.inputs.project }}/terraform.tfstate
            ${{ github.event.inputs.project }}/terraform.tfstate.backup
          retention-days: 90
