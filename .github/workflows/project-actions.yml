name: Project Actions

on:
  workflow_dispatch:
    inputs:
      action:
        required: true
        type: choice
        options:
          - apply
          - destroy
          - start
          - stop
      project:
        required: true

permissions:
  actions: read
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      # 1. Input Validation
      - name: Validate Input
        run: |
          VALID_ACTIONS="apply destroy start stop"
          ACTION="${{ github.event.inputs.action }}"
          if ! echo "$VALID_ACTIONS" | grep -qw "$ACTION"; then
            echo "❌ Invalid action: '$ACTION'. Valid options: apply | destroy | start | stop"
            exit 1
          fi
          echo "✅ Action: $ACTION  |  Project: ${{ github.event.inputs.project }}"

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Validate Project Path
        run: |
          if [ ! -d "${{ github.event.inputs.project }}" ]; then
            echo "❌ Directory not found: ${{ github.event.inputs.project }}"
            exit 1
          fi
          echo "✅ Project path confirmed"

      # 2. SANITIZE PROJECT NAME (Fixes the Forward Slash Error)
      - name: Create Safe Project Name
        run: |
          # Replaces all '/' with '-' so 'projects/Demo' becomes 'projects-Demo'
          SAFE_NAME=$(echo "${{ github.event.inputs.project }}" | sed 's/\//-/g')
          echo "SAFE_PROJECT_NAME=$SAFE_NAME" >> $GITHUB_ENV
          echo "✅ Sanitized artifact name: tfstate-$SAFE_NAME"

      # 3. Restore previous state + resource map from last run
      - name: Download Terraform State from Previous Runs
        uses: actions/github-script@v7
        env:
          SAFE_PROJECT_NAME: ${{ env.SAFE_PROJECT_NAME }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner,
              repo,
            });
            
            const artifactName = `tfstate-${process.env.SAFE_PROJECT_NAME}`;
            const filtered = artifacts.data.artifacts
              .filter(a => a.name === artifactName);

            if (filtered.length === 0) {
              console.log(`ℹ️ No previous state found for ${artifactName} — fresh run.`);
              return;
            }

            const latest = filtered.sort((a, b) =>
              new Date(b.created_at) - new Date(a.created_at)
            )[0];

            console.log(`⬇️ Downloading artifact: ${latest.name} (id ${latest.id})`);
            const download = await github.rest.actions.downloadArtifact({
              owner,
              repo,
              artifact_id: latest.id,
              archive_format: 'zip',
            });

            const fs = require('fs');
            fs.writeFileSync('artifact.zip', Buffer.from(download.data));

      - name: Extract Terraform State
        run: |
          if [ -f artifact.zip ]; then
            unzip -o artifact.zip -d "${{ github.event.inputs.project }}"
            echo "✅ State and resource map extracted"
          else
            echo "ℹ️ No artifact to extract"
          fi

      # 4. AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # 5a. START — bring EC2 instances back online
      - name: Start EC2 Instances
        if: ${{ github.event.inputs.action == 'start' }}
        working-directory: ${{ github.event.inputs.project }}
        run: |
          RESOURCE_FILE="tf_resources.json"
          if [ ! -f "$RESOURCE_FILE" ]; then
            echo "❌ $RESOURCE_FILE not found. Run 'apply' first to build the resource map."
            exit 1
          fi

          INSTANCE_IDS=$(jq -r '.ec2_instance_ids // [] | .[]' "$RESOURCE_FILE" | tr '\n' ' ' | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "⚠️ No EC2 instances found in resource map."
            exit 0
          fi

          echo "🚀 Starting instances: $INSTANCE_IDS"
          aws ec2 start-instances --instance-ids $INSTANCE_IDS
          aws ec2 wait instance-running --instance-ids $INSTANCE_IDS

          echo "✅ All instances running"
          aws ec2 describe-instances \
            --instance-ids $INSTANCE_IDS \
            --query 'Reservations[*].Instances[*].{ID:InstanceId,State:State.Name,PublicIP:PublicIpAddress}' \
            --output table

      # 5b. STOP — gracefully stop EC2 instances
      - name: Stop EC2 Instances
        if: ${{ github.event.inputs.action == 'stop' }}
        working-directory: ${{ github.event.inputs.project }}
        run: |
          RESOURCE_FILE="tf_resources.json"
          if [ ! -f "$RESOURCE_FILE" ]; then
            echo "❌ $RESOURCE_FILE not found. Run 'apply' first to build the resource map."
            exit 1
          fi

          INSTANCE_IDS=$(jq -r '.ec2_instance_ids // [] | .[]' "$RESOURCE_FILE" | tr '\n' ' ' | xargs)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "⚠️ No EC2 instances found in resource map."
            exit 0
          fi

          echo "🛑 Stopping instances: $INSTANCE_IDS"
          aws ec2 stop-instances --instance-ids $INSTANCE_IDS
          aws ec2 wait instance-stopped --instance-ids $INSTANCE_IDS

          echo "✅ All instances stopped"
          aws ec2 describe-instances \
            --instance-ids $INSTANCE_IDS \
            --query 'Reservations[*].Instances[*].{ID:InstanceId,State:State.Name}' \
            --output table

      # 6. Terraform steps (apply / destroy only)
      - name: Setup Terraform
        if: ${{ github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy' }}
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Terraform Init
        if: ${{ github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy' }}
        working-directory: ${{ github.event.inputs.project }}
        run: terraform init -input=false

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: ${{ github.event.inputs.project }}
        run: terraform apply -auto-approve -input=false

      # 7. AUTO-DETECT RESOURCES after apply
      - name: Detect and Save Resource IDs
        if: ${{ github.event.inputs.action == 'apply' }}
        working-directory: ${{ github.event.inputs.project }}
        run: |
          echo "🔍 Scanning Terraform state..."
          terraform show -json > tf_show.json

          JQ_WALK='[.. | objects | select(.type? != null and .values? != null)]'

          EC2_IDS=$(jq -r "$JQ_WALK | map(select(.type == \"aws_instance\")) | .[].values.id" tf_show.json 2>/dev/null | sort -u || true)
          ECS_ARNS=$(jq -r "$JQ_WALK | map(select(.type == \"aws_ecs_service\")) | .[].values.id" tf_show.json 2>/dev/null | sort -u || true)
          RDS_IDS=$(jq -r "$JQ_WALK | map(select(.type == \"aws_db_instance\")) | .[].values.id" tf_show.json 2>/dev/null | sort -u || true)
          LAMBDA_ARNS=$(jq -r "$JQ_WALK | map(select(.type == \"aws_lambda_function\")) | .[].values.arn" tf_show.json 2>/dev/null | sort -u || true)
          ALB_ARNS=$(jq -r "$JQ_WALK | map(select(.type == \"aws_lb\" or .type == \"aws_alb\")) | .[].values.arn" tf_show.json 2>/dev/null | sort -u || true)
          S3_BUCKETS=$(jq -r "$JQ_WALK | map(select(.type == \"aws_s3_bucket\")) | .[].values.bucket" tf_show.json 2>/dev/null | sort -u || true)
          EKS_CLUSTERS=$(jq -r "$JQ_WALK | map(select(.type == \"aws_eks_cluster\")) | .[].values.name" tf_show.json 2>/dev/null | sort -u || true)
          ASG_NAMES=$(jq -r "$JQ_WALK | map(select(.type == \"aws_autoscaling_group\")) | .[].values.name" tf_show.json 2>/dev/null | sort -u || true)

          to_array() { echo "$1" | jq -R . | jq -s 'map(select(length > 0))'; }

          jq -n \
            --argjson ec2  "$(to_array "$EC2_IDS")"     \
            --argjson ecs  "$(to_array "$ECS_ARNS")"    \
            --argjson rds  "$(to_array "$RDS_IDS")"     \
            --argjson lmb  "$(to_array "$LAMBDA_ARNS")" \
            --argjson alb  "$(to_array "$ALB_ARNS")"    \
            --argjson s3   "$(to_array "$S3_BUCKETS")"  \
            --argjson eks  "$(to_array "$EKS_CLUSTERS")"\
            --argjson asg  "$(to_array "$ASG_NAMES")"   \
            '{
              ec2_instance_ids: $ec2,
              ecs_service_arns: $ecs,
              rds_identifiers:  $rds,
              lambda_arns:      $lmb,
              alb_arns:         $alb,
              s3_buckets:       $s3,
              eks_clusters:     $eks,
              asg_names:        $asg
            }' > tf_resources.json

          rm -f tf_show.json

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        working-directory: ${{ github.event.inputs.project }}
        run: terraform destroy -auto-approve -input=false

      # 8. Persist state using the SANITIZED NAME
      - name: Upload Terraform State
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfstate-${{ env.SAFE_PROJECT_NAME }}
          path: |
            ${{ github.event.inputs.project }}/terraform.tfstate
            ${{ github.event.inputs.project }}/terraform.tfstate.backup
            ${{ github.event.inputs.project }}/tf_resources.json
          retention-days: 90
