name: Eagle Eye — Auto-discover & Redeploy

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'   # only trigger when something under projects/ changes

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Scan projects/*/modules/ for new Terraform directories.
  #          Writes auto-discovered-projects.json and commits it back.
  #          Signals job 2 only when the file actually changed.
  # ───────────────────────────────────────────────────────────────────────────
  discover:
    name: Scan & update project registry
    runs-on: ubuntu-latest
    outputs:
      has_new: ${{ steps.scan.outputs.has_new }}

    steps:
      - name: Checkout (full history for reliable git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a bot token so the commit the job makes can itself trigger CI
          # (the default GITHUB_TOKEN cannot). If you don't need that, remove
          # the token line — the commit will still land but [skip ci] prevents loops.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run discovery script
        id: scan
        run: |
          node scripts/discover-projects.js
          if [ -f /tmp/eagle-eye-has-new ]; then
            echo "has_new=true"  >> $GITHUB_OUTPUT
          else
            echo "has_new=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated registry
        if: steps.scan.outputs.has_new == 'true'
        run: |
          git config user.name  "Eagle Eye Bot"
          git config user.email "eagle-eye-bot@github-actions"
          git add nerdlets/test/auto-discovered-projects.json
          # Only commit if the file actually changed (idempotent)
          git diff --staged --quiet || \
            git commit -m "chore(eagle-eye): auto-discover new projects [skip ci]"
          git push

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Re-publish the Nerdpack so the bundled JSON reaches users.
  #          Only runs when job 1 found at least one new project.
  # ───────────────────────────────────────────────────────────────────────────
  redeploy:
    name: Publish Nerdpack to New Relic
    needs: discover
    if: needs.discover.outputs.has_new == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (pick up bot commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install NR1 CLI
        run: |
          curl -s https://cli.nr-ext.net/installer.sh | sudo bash
          nr1 --version

      - name: Install Nerdpack dependencies
        run: npm install

      - name: Configure NR1 profile
        env:
          NR_API_KEY:    ${{ secrets.NR_API_KEY }}
          NR_ACCOUNT_ID: ${{ secrets.NR_ACCOUNT_ID }}
          NR_REGION:     ${{ secrets.NR_REGION }}
        run: |
          REGION="${NR_REGION:-US}"
          nr1 profiles:add \
            --name  eagle-eye-ci \
            --api-key "$NR_API_KEY" \
            --region  "$REGION"
          nr1 profiles:default --name eagle-eye-ci

      - name: Publish
        run: nr1 nerdpack:publish --profile eagle-eye-ci

      - name: Subscribe account to STABLE channel
        env:
          NR_ACCOUNT_ID: ${{ secrets.NR_ACCOUNT_ID }}
        run: |
          nr1 nerdpack:subscribe \
            --channel STABLE \
            --profile eagle-eye-ci
        # Subscription may already exist — that's fine
        continue-on-error: true

      - name: Done
        run: |
          echo "✅ Nerdpack published."
          echo "   New projects are live in Eagle Eye — edit them via the ··· manage panel."
