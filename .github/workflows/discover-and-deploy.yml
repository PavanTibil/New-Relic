name: Auto-discover & Redeploy

on:
  push:
    branches: [main]
    paths:
      - 'projects/**'   # trigger on any add / delete / edit under projects/

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Diff projects/*/modules/ against the current registry.
  #          Adds newly found projects, REMOVES deleted ones, commits back.
  #          Signals job 2 only when the registry file actually changed.
  # ───────────────────────────────────────────────────────────────────────────
  discover:
    name: Sync project registry (add + remove)
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.scan.outputs.has_changes }}

    steps:
      - name: Checkout (full history for reliable git diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run discovery + cleanup script
        id: scan
        run: |
          node scripts/discover-projects.js
          if [ -f /tmp/eagle-eye-has-changes ]; then
            echo "has_changes=true"  >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated registry
        if: steps.scan.outputs.has_changes == 'true'
        run: |
          git config user.name  "Eagle Eye Bot"
          git config user.email "eagle-eye-bot@github-actions"
          git add nerdlets/test/auto-discovered-projects.json
          git diff --staged --quiet || \
            git commit -m "chore(eagle-eye): sync project registry (add/remove) [skip ci]"
          git push

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Re-publish the Nerdpack so the updated registry reaches users.
  #          Runs on any registry change (additions OR removals).
  # ───────────────────────────────────────────────────────────────────────────
  redeploy:
    name: Publish Nerdpack to New Relic
    needs: discover
    if: needs.discover.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (pick up bot commit)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - name: Install NR1 CLI
        run: |
          curl -s https://cli.nr-ext.net/installer.sh | sudo bash
          nr1 --version

      - name: Install Nerdpack dependencies
        run: npm install

      - name: Configure NR1 profile
        env:
          NR_API_KEY:    ${{ secrets.NR_API_KEY }}
          NR_ACCOUNT_ID: ${{ secrets.NR_ACCOUNT_ID }}
          NR_REGION:     ${{ secrets.NR_REGION }}
        run: |
          REGION="${NR_REGION:-US}"
          nr1 profiles:add \
            --name  eagle-eye-ci \
            --api-key "$NR_API_KEY" \
            --region  "$REGION"
          nr1 profiles:default --name eagle-eye-ci

      - name: Publish
        run: nr1 nerdpack:publish --profile eagle-eye-ci

      - name: Subscribe account to STABLE channel
        env:
          NR_ACCOUNT_ID: ${{ secrets.NR_ACCOUNT_ID }}
        run: |
          nr1 nerdpack:subscribe \
            --channel STABLE \
            --profile eagle-eye-ci
        continue-on-error: true

      - name: Done
        run: |
          echo "✅ Nerdpack published."
          echo "   Registry changes are live in Eagle Eye — edit via the ··· manage panel."
