name: New Relic Alert - Send Email

on:
  repository_dispatch:
    types: [newrelic_alert]

jobs:
  send-alert-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send Alert Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 New Relic Alert: ${{ github.event.client_payload.alertName }}"
          to: pavan.ks@tibilsolutions.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            🚨 New Relic Alert Triggered!

            Alert Name : ${{ github.event.client_payload.alert_name }}
            Severity   : ${{ github.event.client_payload.severity }}
            Message    : ${{ github.event.client_payload.message }}
            Time       : ${{ github.event.client_payload.time }}
            Entity     : ${{ github.event.client_payload.entity_name }}

            Please investigate immediately.
