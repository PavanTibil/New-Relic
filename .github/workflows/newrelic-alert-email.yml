name: New Relic Alert - Send Email
on:
  repository_dispatch:
    types: [newrelic_alert]
jobs:
  send-alert-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send Alert Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🚨 ${{ github.event.client_payload.alert_name }}"
          to: pavan.ks@tibilsolutions.com
          from: ${{ secrets.MAIL_USERNAME }}
          content_type: text/html
          body: |
            <h2>🚨 ${{ github.event.client_payload.alert_name }}</h2>
            <hr/>
            <table>
              <tr><td><b>Severity</b></td><td>: ${{ github.event.client_payload.severity }}</td></tr>
              <tr><td><b>Message</b></td><td>: ${{ github.event.client_payload.message }}</td></tr>
              <tr><td><b>Time</b></td><td>: ${{ github.event.client_payload.time }}</td></tr>
              <tr><td><b>Entity</b></td><td>: ${{ github.event.client_payload.entity_name }}</td></tr>
            </table>
            <br/>
            <p>Please investigate immediately.</p>
